<div class="track">
  <section class="track__section track__section--status">
    <sl-checkbox
      #activeRef
      [checked]="track().active ? 'checked' : null"
      size="small"
      (sl-change)="setActive(activeRef.checked)"
      >{{ ('components.track.active' | translate)() }}</sl-checkbox
    >
    <sl-checkbox
      #soloRef
      [checked]="track().solo ? 'checked' : null"
      size="small"
      (sl-change)="setSolo(soloRef.checked)"
      >{{ ('components.track.solo' | translate)() }}</sl-checkbox
    >
    <sl-checkbox
      #muteRef
      [checked]="track().mute ? 'checked' : null"
      size="small"
      (sl-change)="setMute(muteRef.checked)"
      >{{ ('components.track.mute' | translate)() }}</sl-checkbox
    >
  </section>
  <section class="track__section track__section--timing">
    <sl-tooltip
      [content]="
        (
          'components.track.swing'
          | translate: { min: '' + minSwing, max: '' + maxSwing }
        )()
      "
    >
      <sl-input
        #swingRef
        class="track__swing"
        type="number"
        size="small"
        [min]="minSwing"
        [max]="maxSwing"
        [value]="track().swing"
        (sl-change)="setSwing($any(swingRef.value))"
      ></sl-input>
    </sl-tooltip>
    <sl-tooltip
      [content]="
        (
          'components.track.humanize'
          | translate: { min: '' + minHumanize, max: '' + maxHumanize }
        )()
      "
    >
      <sl-input
        #humanizeRef
        class="track__humanize"
        type="number"
        size="small"
        [min]="minHumanize"
        [max]="maxHumanize"
        [value]="track().humanize"
        (sl-change)="setHumanize($any(humanizeRef.value))"
      ></sl-input>
    </sl-tooltip>
  </section>
  <section class="track__section track__section--steps">
    <ul class="track__steps">
      @for (step of track().steps; let j = $index; track j) {
        <li class="track__step">
          <app-note-selector
            [trackNumber]="number()"
            [stepNumber]="j"
            [octave]="step.octave"
            [semitone]="step.semitone"
            [velocity]="step.velocity"
            [step]="step.duration.step"
            [numerator]="step.duration.numerator"
            [denominator]="step.duration.denominator"
          ></app-note-selector>
        </li>
      }
    </ul>
  </section>
</div>
