<div class="bars-selector">
  <sl-input
    #valueRef
    class="bars-selector__value"
    [label]="('components.barsSelector.label' | translate)()"
    type="number"
    [min]="minBars"
    [max]="maxBars"
    [value]="value()"
    size="small"
    (sl-change)="setValue($any(valueRef.value))"
  ></sl-input>
  /
  <sl-input
    #baseRef
    class="bars-selector__base"
    type="number"
    [min]="minBars"
    [max]="maxBars"
    [value]="base()"
    size="small"
    (sl-change)="setBase($any(baseRef.value))"
  ></sl-input>
</div>
